<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA CBT | MTH 102 - Limits, Derivatives & More</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h1 {
            color: #001f3f;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .question-number {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number span {
            font-weight: bold;
            color: #001f3f;
        }

        .question-number .section-tag {
            background: #ff851b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option:hover {
            border-color: #001f3f;
            background: #f8f9fa;
            transform: translateX(5px);
        }

        .option.selected {
            background: #001f3f;
            color: white;
            border-color: #001f3f;
        }

        .option.correct {
            background: #28a745 !important;
            color: white;
            border-color: #28a745;
        }

        .option.wrong {
            background: #dc3545 !important;
            color: white;
            border-color: #dc3545;
        }

        .option-letter {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-prev {
            background: #6c757d;
        }

        .btn-next {
            background: #ff851b;
        }

        .btn-submit {
            background: #001f3f;
        }

        .score-container {
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28a745, #20c997);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            flex-direction: column;
            color: white;
        }

        .score-number {
            font-size: 48px;
            font-weight: bold;
        }

        .score-label {
            font-size: 14px;
        }

        .review-section {
            margin-top: 30px;
            text-align: left;
        }

        .review-item {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid;
        }

        .review-correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .review-wrong {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .dance-btn {
            display: inline-block;
            text-align: center;
            padding: 15px 30px;
            color: white;
            border-radius: 10px;
            margin-top: 20px;
            text-decoration: none;
            font-weight: bold;
            background: linear-gradient(90deg, #25D366, #128C7E);
            animation: dance 1s infinite alternate;
        }

        @keyframes dance {
            from { 
                transform: translateY(0) scale(1);
            }
            to { 
                transform: translateY(-8px) scale(1.05);
            }
        }

        .timer {
            text-align: center;
            font-size: 20px;
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .quiz-container {
                padding: 20px;
                margin: 10px;
            }
            
            .question-text {
                font-size: 16px;
            }
            
            button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>

    { q: "$f: x \\to x^2+6$, domain if range is $\\{6, 7, 10, 15\\}$:", options: ["$\\{5, 6, 8, 12\\}$", "$\\{-1, 0, 1, 2\\}$", "$\\{0, 1, 2, 3\\}$", "$\\{-2, -1, 0, 1\\}$"], answer: 2, section: "Functions" },

    { q: "$f: x \\to x+1$ is what mapping:", options: ["Constant", "Many-to-one", "One-to-one", "Onto"], answer: 2, section: "Functions" },

    { q: "Find $g(x+1)-g(x)$ if $g(x)=x^2+3x+4$:", options: ["$2x+3$", "$2x+4$", "$x+4$", "0"], answer: 1, section: "Functions" },
    { q: "If $f(x)=1/(x-1)$, find $f(1-x)$:", options: ["$1/(x-1)$", "$1/x$", "$-1/x$", "0"], answer: 2, section: "Functions" },
    { q: "If $f(x)=x/(x-2)$, find $f^{-1}(x)$:", options: ["$x/(x+1)$", "$2x/(x+1)$", "$2x/(x-1)$", "0"], answer: 2, section: "Functions" },
    { q: "If $f(x)=x^3+5$, find $f^{-1}(x)$:", options: ["$x-5$", "$\\sqrt[3]{x+5}$", "$\\sqrt[3]{x-5}$", "0"], answer: 2, section: "Functions" },
    { q: "Find $g(f(x))$ if $f(x)=x^2, g(x)=2x-1$:", options: ["$x^2-1$", "$2(x-1)^2$", "$2x^2-1$", "0"], answer: 2, section: "Functions" },
    { q: "Mapping $f(x)=c$ is:", options: ["Linear", "Identity", "Constant", "Quadratic"], answer: 2, section: "Functions" },
    { q: "Range of $f(x)=x^2-2$ for $\\{-2, -1, 0, 1\\}$:", options: ["$\\{1, 2\\}$", "$\\{-2, -1, 0\\}$", "$\\{-2, -1, 2\\}$", "0"], answer: 2, section: "Functions" },
    { q: "Find $f(x)$ if $f(x+1) = x^2+2x+3$:", options: ["$x^2+3$", "$x^2+2$", "$x^2+1$", "0"], answer: 1, section: "Functions" },
    { q: "Mapping $f(x)=x$ is:", options: ["Quadratic", "Linear", "Constant", "Identity"], answer: 3, section: "Functions" },
    { q: "If $f(x) = 1/(2-x)$, find $f^{-1}(-1/2)$:", options: ["2", "-2", "0", "4"], answer: 3, section: "Functions" },
    { q: "If $g(x)=x^2+2x+1$, find $g(1)$:", options: ["1", "4", "2", "0"], answer: 1, section: "Functions" },
    { q: "Find $f(2)$ if $f(x-4) = x^2+2x+3$:", options: ["27", "3", "51", "0"], answer: 2, section: "Functions" },
    { q: "If $f(x) = 2x^2+5x+2$, find $f(1)$:", options: ["2", "5", "7", "9"], answer: 3, section: "Functions" },
    { q: "Mapping where range $\\subset$ codomain:", options: ["Injective", "Bijective", "Onto", "Into"], answer: 3, section: "Functions" },
    { q: "Composition $f(g(x))$ is:", options: ["$fg$", "$f+g$", "$g \\circ f$", "$f \\circ g$"], answer: 3, section: "Functions" },
    { q: "If $f(x) = x^2-1$, $f(f(2))$ is:", options: ["5", "3", "8", "0"], answer: 2, section: "Functions" },
    { q: "Find $f(x)$ for linear $f(x)$ where $f'(x)=-3, f(1)=4$:", options: ["$-3x-7$", "$3x+4$", "$-3x+7$", "0"], answer: 2, section: "Functions" }
];

// App State
let currentSet = [], userAnswers = [], qIdx = 0, timerInterval;
const TIME_LIMIT = 20 * 60; // 20 minutes
let timeLeft = TIME_LIMIT;
let quizSubmitted = false;

// Shuffle array (Fisher-Yates)
function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function initQuiz() {
    // Get sections
    const limits = allQuestions.slice(0, 30);
    const derivatives = allQuestions.slice(30, 60);
    const applications = allQuestions.slice(60, 90);
    const functions = allQuestions.slice(90, 120);
    
    // Pick 5 random from each
    currentSet = [
        ...shuffle(limits).slice(0, 5),
        ...shuffle(derivatives).slice(0, 5),
        ...shuffle(applications).slice(0, 5),
        ...shuffle(functions).slice(0, 5)
    ];
    
    // Shuffle the combined set for variety
    currentSet = shuffle(currentSet);
    
    userAnswers = new Array(20).fill(null);
    qIdx = 0;
    timeLeft = TIME_LIMIT;
    quizSubmitted = false;
    startTimer();
    render();
}

function startTimer() {
    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            autoSubmit();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    const timerEl = document.getElementById('timer');
    if (timerEl) {
        timerEl.textContent = `Time: ${mins}:${secs.toString().padStart(2, '0')}`;
        if (timeLeft < 60) timerEl.style.color = '#dc3545';
    }
}

function autoSubmit() {
    alert('Time is up! Your quiz will be submitted automatically.');
    submit();
}

function getSection(qIdx) {
    const indices = [0, 5, 10, 15];
    const sections = ['Limits', 'Derivatives', 'Applications', 'Functions'];
    for (let i = 0; i < indices.length; i++) {
        if (qIdx < indices[i] + 5) return sections[i];
    }
    return '';
}

function render() {
    if (quizSubmitted) return;
    
    const q = currentSet[qIdx];
    const progress = ((qIdx + 1) / 20) * 100;
    const letters = ['A', 'B', 'C', 'D'];
    
    document.getElementById('quiz-body').innerHTML = `
        <div class="header">
            <h1>📚 MTH 102 Quiz</h1>
            <div class="subtitle">Limits • Derivatives • Applications • Functions</div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
        
        <div class="timer" id="timer"></div>
        
        <div class="question-number">
            <span>Question ${qIdx + 1} of 20</span>
            <span class="section-tag">${q.section}</span>
        </div>
        
        <div class="question-text">${q.q}</div>
        
        <div class="options-container">
            ${q.options.map((o, i) => `
                <div class="option ${userAnswers[qIdx] === i ? 'selected' : ''}" 
                     onclick="select(${i})">
                    <div class="option-letter">${letters[i]}</div>
                    <div>${o}</div>
                </div>
            `).join('')}
        </div>
        
        <div class="button-group">
            <button class="btn-prev" onclick="change(-1)" ${qIdx === 0 ? 'disabled' : ''}>
                ← Previous
            </button>
            <button class="btn-next" onclick="change(1)" ${qIdx === 19 ? 'disabled' : ''}>
                Next →
            </button>
        </div>
        
        <div style="text-align: center; margin-top: 15px;">
            <button class="btn-submit" onclick="submit()">
                Submit Quiz
            </button>
        </div>
        
        <div style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;">
            ${Array(20).fill(0).map((_, i) => `
                <button 
                    onclick="goToQuestion(${i})"
                    style="padding: 8px 12px; font-size: 12px; 
                           background: ${userAnswers[i] !== null ? '#28a745' : '#6c757d'};
                           ${i === qIdx ? 'border: 3px solid #ff851b;' : ''}"
                    title="Question ${i+1}">
                    ${i+1}
                </button>
            `).join('')}
        </div>
    `;
    
    updateTimerDisplay();
    MathJax.typesetPromise();
}

function select(i) {
    if (quizSubmitted) return;
    userAnswers[qIdx] = i;
    render();
}

function change(step) {
    if (qIdx + step >= 0 && qIdx + step < 20) {
        qIdx += step;
        render();
    }
}

function goToQuestion(i) {
    if (quizSubmitted) return;
    qIdx = i;
    render();
    document.querySelector('.quiz-container').scrollIntoView({ behavior: 'smooth' });
}

function submit() {
    if (quizSubmitted) return;
    quizSubmitted = true;
    clearInterval(timerInterval);
    
    const score = userAnswers.filter((a, i) => a === currentSet[i].answer).length;
    const percentage = Math.round((score / 20) * 100);
    const letters = ['A', 'B', 'C', 'D'];
    
    let grade, color;
    if (percentage >= 80) { grade = 'Excellent! 🌟'; color = '#28a745'; }
    else if (percentage >= 60) { grade = 'Good Job! 👍'; color = '#20c997'; }
    else if (percentage >= 40) { grade = 'Keep Practicing! 📚'; color = '#ff851b'; }
    else { grade = 'Need Improvement 💪'; color = '#dc3545'; }
    
    let body = document.getElementById('quiz-body');
    body.innerHTML = `
        <div class="score-container">
            <h1 style="color: ${color};">${grade}</h1>
            
            <div class="score-circle" style="background: ${color};">
                <div class="score-number">${score}</div>
                <div class="score-label">out of 20</div>
            </div>
            
            <p style="font-size: 20px; margin: 10px 0;">${percentage}%</p>
            
            <div class="review-section">
                <h3 style="margin-bottom: 20px;">Review Answers</h3>
                ${currentSet.map((q, i) => {
                    const isCorrect = userAnswers[i] === q.answer;
                    return `
                        <div class="review-item ${isCorrect ? 'review-correct' : 'review-wrong'}">
                            <strong>Q${i+1}:</strong> ${q.q}
                            <br>
                            <span style="color: ${isCorrect ? '#28a745' : '#dc3545'};">
                                ${isCorrect ? '✓' : '✗'} 
                                Your answer: ${userAnswers[i] !== null ? q.options[userAnswers[i]] : 'Not answered'}
                            </span>
                            ${!isCorrect ? `<br><span style="color: #28a745;">Correct: ${q.options[q.answer]}</span>` : ''}
                        </div>
                    `;
                }).join('')}
            </div>
            
            <button onclick="location.reload()" style="background: #001f3f; margin-top: 20px; padding: 12px 30px;">
                Retake Quiz
            </button>
            
            <br>
            <a href="https://chat.whatsapp.com/EfRqG1ekcym0MflO4MiEFj" class="dance-btn">
                🚀 Join GPA Community on WhatsApp
            </a>
        </div>
    `;
    
    MathJax.typesetPromise();
}

// Initialize on load
initQuiz();
</script>
</body>
