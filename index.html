<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA MTH 102 Quiz</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .quiz-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            padding: 12px 20px;
            background: #001f3f;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }
        
        .header .badge {
            background: #ff851b;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .progress-wrap {
            padding: 0 20px;
            flex-shrink: 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 8px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: #28a745;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .timer {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: #001f3f;
            padding: 4px;
            flex-shrink: 0;
        }
        
        .timer.warning { color: #dc3545; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            50% { transform: scale(1.05); }
        }
        
        .quiz-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .question-text {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            font-weight: 500;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .option:active {
            transform: scale(0.98);
        }
        
        .option.selected {
            background: #001f3f;
            color: white;
            border-color: #001f3f;
        }
        
        .option.correct {
            background: #28a745 !important;
            border-color: #28a745;
            color: white;
        }
        
        .option.wrong {
            background: #dc3545 !important;
            border-color: #dc3545;
            color: white;
        }
        
        .opt-letter {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .selected .opt-letter {
            background: rgba(255,255,255,0.2);
        }
        
        .bottom-nav {
            padding: 12px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            background: white;
        }
        
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-prev {
            background: #6c757d;
            color: white;
        }
        
        .btn-submit {
            background: #dc3545;
            color: white;
        }
        
        .btn-next {
            background: #ff851b;
            color: white;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .dot-nav {
            display: flex;
            gap: 4px;
            justify-content: center;
            padding: 4px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
        }
        
        .dot.active {
            background: #001f3f;
            width: 24px;
            border-radius: 4px;
        }
        
        .dot.answered {
            background: #28a745;
        }
        
        .score-screen {
            text-align: center;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28a745, #20c997);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto;
            flex-direction: column;
            color: white;
        }
        
        .score-num {
            font-size: 36px;
            font-weight: bold;
            line-height: 1;
        }
        
        .score-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .review-item {
            text-align: left;
            padding: 8px;
            margin: 6px 0;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .review-correct {
            background: #d4edda;
            border-left: 3px solid #28a745;
        }
        
        .review-wrong {
            background: #f8d7da;
            border-left: 3px solid #dc3545;
        }
        
        .join-btn {
            display: block;
            text-align: center;
            padding: 12px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 10px;
            animation: bounce 1s infinite alternate;
        }
        
        @keyframes bounce {
            to { transform: translateY(-3px); }
        }
        
        .retake-btn {
            width: 100%;
            background: #001f3f;
            color: white;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="app"></div>

<script>
const questions = [
    // LIMITS

    { q: "Find $\\lim_{x \\to 0} \\frac{\\sin 3x}{2x}$", o: ["2/3", "1", "0", "3/2"], a: 3, s: "Limits" },
    { q: "Find $\\lim_{x \\to \\pi} \\frac{\\sin(\\pi - x)}{\\pi - x}$", o: ["-1", "0", "Undefined", "1"], a: 3, s: "Limits" },
    { q: "Find $\\lim_{x \\to 0} x^2 \\sin(1/x)$", o: ["1", "Does not exist", "$\\infty$", "0"], a: 3, s: "Limits" },
    { q: "If $f(x)=\\frac{x^2-x}{2x}$, $f(0)=k$ for continuity", o: ["1/2", "0", "1", "-1/2"], a: 3, s: "Limits" },
    { q: "Find $\\lim_{x \\to \\infty} x \\sin(1/x)$", o: ["0", "$\\infty$", "Undefined", "1"], a: 3, s: "Limits" },
    { q: "Find $\\lim_{x \\to 0} \\frac{\\sin x}{x^2 + 3x}$", o: ["1", "3", "1/3", "0"], a: 2, s: "Limits" },
    
    // DERIVATIVES
    { q: "Find $dy/dx$ for $y = (x+1)^{10}$", o: ["$10x^9$", "$9(x+1)^{10}$", "$(x+1)^9$", "$10(x+1)^9$"], a: 3, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = \\sqrt{2x+3}$", o: ["$2\\sqrt{2x+3}$", "$\\frac{1}{2\\sqrt{2x+3}}$", "$\\frac{1}{\\sqrt{2x+3}}$", "$\\sqrt{2x+3}$"], a: 1, s: "Derivatives" },
    { q: "Gradient of $y = \\frac{3x}{x+1}$ at $x=2$", o: ["3", "1", "1/3", "0"], a: 2, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y=x^{12}+a+b+c+d+e$", o: ["$12x^{11}+a$", "0", "$12x^{12}$", "$12x^{11}$"], a: 3, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = \\frac{\\cos \\theta + \\sin \\theta}{\\sin \\theta}$", o: ["1", "$\\csc^2 \\theta$", "$-\\csc^2 \\theta$", "0"], a: 2, s: "Derivatives" },
    { q: "Differentiate $f(x) = 2x(x^2+3)$", o: ["$2x^2+6$", "$6x^2+6$", "$6x^2+3$", "$2x^2+3$"], a: 1, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = (1+x)^2$", o: ["$1+x$", "$1+2x$", "$2+2x$", "$2(1+x)$"], a: 2, s: "Derivatives" },
    { q: "Differentiate $y = 3x^2 + 2/x$", o: ["$6x + 2/x^2$", "$6x - 2/x^2$", "$3x - 2/x^2$", "0"], a: 1, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = x \\sin x$", o: ["$\\sin x - x \\cos x$", "1", "$\\sin x + x \\cos x$", "$\\cos x + x \\sin x$"], a: 2, s: "Derivatives" },
    { q: "Differentiate $y = \\sin^2(5x)$", o: ["$2 \\sin 5x \\cos 5x$", "$5 \\sin 5x \\cos 5x$", "1", "$10 \\sin 5x \\cos 5x$"], a: 3, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = \\log_e(\\tan 2x)$", o: ["$\\tan 2x$", "$2 \\sec^2 2x / \\tan 2x$", "0", "$\\sec^2 2x / \\tan 2x$"], a: 1, s: "Derivatives" },

    { q: "Find $dy/dx$ for $y = \\sin(2x^3+3x-4)$", o: ["$(6x^2+3)\\sin(2x^3+3x-4)$", "0", "$\\cos(2x^3+3x-4)$", "$(6x^2+3)\\cos(2x^3+3x-4)$"], a: 3, s: "Derivatives" },
    { q: "Differentiate $y = x^3+x^2$", o: ["$x^2+2x$", "0", "$3x^2+x$", "$3x^2+2x$"], a: 3, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = \\cos(3x^2-2x)$", o: ["$(6x-2)\\sin(3x^2-2x)$", "0", "$-(6x-2)\\sin(3x^2-2x)$", "$-(6x-2)\\cos(3x^2-2x)$"], a: 2, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = (x^2+5)^4$", o: ["$4x(x^2+5)^3$", "0", "$8x(x^2+5)^4$", "$8x(x^2+5)^3$"], a: 3, s: "Derivatives" },
    { q: "Differentiate $y = 3\\sqrt{x^3}$", o: ["$9\\sqrt{x}$", "0", "$\\frac{3}{2}\\sqrt{x}$", "$\\frac{9}{2}\\sqrt{x}$"], a: 3, s: "Derivatives" },
    { q: "Differentiate $y = \\sec x$", o: ["$-\\sec x \\tan x$", "1", "$\\sec^2 x$", "$\\sec x \\tan x$"], a: 3, s: "Derivatives" },
    { q: "Differentiate $y = \\cot x$", o: ["1", "$\\csc^2 x$", "$-\\csc^2 x$", "$-\\sec^2 x$"], a: 2, s: "Derivatives" },
    { q: "Differentiate $y = x \\ln x$", o: ["$x$", "1", "$1+\\ln x$", "$\\ln x$"], a: 2, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = (2x+3)^5$", o: ["$2(2x+3)^4$", "0", "$5(2x+3)^4$", "$10(2x+3)^4$"], a: 3, s: "Derivatives" },
    { q: "Find $dy/dx$ for $y = \\frac{1}{x^2} - \\frac{1}{x}$", o: ["$2x^{-3}+x^{-2}$", "$2x^{-3}-x^{-2}$", "0", "$-2x^{-3}+x^{-2}$"], a: 3, s: "Derivatives" },
    
    // APPLICATIONS
    { q: "At turning points, the gradient $dy/dx$ is:", o: ["1", "-1", "undefined", "0"], a: 3, s: "Applications" },
    { q: "If $f''(x) > 0$, the function has a:", o: ["Maximum", "Inflection", "Discontinuity", "Minimum"], a: 3, s: "Applications" },
    { q: "Turning point of $f(x) = x^2-3x+2$ is at:", o: ["$x=1$", "$x=2$", "$x=3/2$", "$x=0$"], a: 2, s: "Applications" },
    { q: "Max value of $y = 1-2x-3x^2$ is:", o: ["1", "4/3", "0", "2/3"], a: 1, s: "Applications" },
    { q: "If $V = \\frac{4}{3} \\pi r^3$, find $dV/dr$:", o: ["$4\\pi r^2$", "$8\\pi r$", "$4/3 \\pi r^2$", "0"], a: 0, s: "Applications" },
    { q: "Min value of $y = x^2-3x+2$ for real $x$:", o: ["$1/4$", "$1$", "-1/4", "0"], a: 2, s: "Applications" },
    { q: "For $f(x) = x^3-x$, minimum is at:", o: ["$x=0$", "$x=1$", "$x=-1/\\sqrt{3}$", "$x=1/\\sqrt{3}$"], a: 3, s: "Applications" },
    { q: "Turning point of $y=x^2-2x-3$ is at:", o: ["$x=2$", "$x=0$", "$x=-1$", "$x=1$"], a: 3, s: "Applications" },
    { q: "Max value of $2+\\sin(\\theta+25^\\circ)$:", o: ["1", "2", "4", "3"], a: 3, s: "Applications" },
    { q: "Min value of $f(x) = x^2+3x+7$:", o: ["7", "19/4", "3/2", "0"], a: 1, s: "Applications" },
    { q: "If $y = x^3$, at $x=0$ the point is:", o: ["Maximum", "Minimum", "Inflection", "Discontinuity"], a: 2, s: "Applications" },
    { q: "Turning point of $f(x) = -3x^2+3x+2$:", o: ["$(1/2, 1/4)$", "$(-1/2, 11/4)$", "$(-1/2, 1/4)$", "$(1/2, 11/4)$"], a: 3, s: "Applications" },
    { q: "Min value of $y = x^3-7x^2+15x$:", o: ["$x=5/3$", "$x=3$", "$x=-5/3$", "$x=5/3$ or $3$"], a: 1, s: "Applications" },
    { q: "For $y = 4t^2-40t+300$, minimum is at:", o: ["$t=20$", "$t=10$", "$t=5$", "$t=0$"], a: 2, s: "Applications" },
    { q: "For $x^2-6x+3$, gradient is zero at:", o: ["$x=-3$", "$x=0$", "$x=6$", "$x=3$"], a: 3, s: "Applications" },
    { q: "Gradient of $2x^2-5x+6$ at $x=1$:", o: ["2", "1", "0", "-1"], a: 3, s: "Applications" },
    { q: "If $y = x^2-3x+2$, find min point:", o: ["$(1.5, -0.25)$", "$(1.5, 0.25)$", "$(-1.5, -0.25)$", "$(0, 2)$"], a: 0, s: "Applications" },
    { q: "Rate of change of area of circle with radius:", o: ["$\\pi r$", "$\\pi r^2$", "$2\\pi r$", "0"], a: 2, s: "Applications" },
    
    // FUNCTIONS
    { q: "Given $f(x)=3x-2$, find $f^{-1}(x)$:", o: ["$3x+2$", "x+2", "$(x-2)/3$", "$(x+2)/3$"], a: 3, s: "Functions" },
    { q: "$f: x \\to x+1$ is what mapping:", o: ["Constant", "Many-to-one", "One-to-one", "Onto"], a: 2, s: "Functions" },
    { q: "If $f(x)=2x+1$, $g(x)=x^2-2$, find $g \\circ f$:", o: ["$x^2+2x-1$", "$4x^2+4x-1$", "$4x^2-4x+1$", "0"], a: 1, s: "Functions" },
    { q: "Domain of $f(x) = \\frac{x}{3-x}$:", o: ["$x > 3$", "All Real", "$x \\neq 0$", "$x \\neq 3$"], a: 3, s: "Functions" },
    { q: "$f(x)=x^2-1$, what is $f(0)$?:", o: ["1", "0", "2", "-1"], a: 3, s: "Functions" },
    { q: "$f: A \\to B$, a mapping is onto if:", o: ["Range = Codomain", "Bijective", "Injective", "Range $\\subset$ Codomain"], a: 0, s: "Functions" },

    { q: "Inverse of $f(x) = e^x$:", o: ["$x$", "$\\log_{10} x$", "$1/e^x$", "$\\ln x$"], a: 3, s: "Functions" },
    { q: "Mapping $f(x)=c$ is:", o: ["Linear", "Identity", "Constant", "Quadratic"], a: 2, s: "Functions" },
    { q: "Find $f(x)$ if $f(x+1) = x^2+2x+3$:", o: ["$x^2+3$", "$x^2+2$", "$x^2+1$", "0"], a: 1, s: "Functions" },
    { q: "Mapping $f(x)=x$ is:", o: ["Quadratic", "Linear", "Constant", "Identity"], a: 3, s: "Functions" },
    { q: "If $g(x)=x^2+2x+1$, find $g(1)$:", o: ["1", "4", "2", "0"], a: 1, s: "Functions" },
    { q: "If $f(x) = 2x^2+5x+2$, find $f(1)$:", o: ["2", "5", "7", "9"], a: 3, s: "Functions" },
    { q: "Composition $f(g(x))$ is:", o: ["$fg$", "$f+g$", "$g \\circ f$", "$f \\circ g$"], a: 3, s: "Functions" },
];

const TOTAL = 20;
const TIME = 10 * 60;

let set = [], answers = [], idx = 0, timer, left = TIME, done = false;

function shuffle(a) {
    let b = [...a];
    for (let i = b.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b[i], b[j]] = [b[j], b[i]];
    }
    return b;
}

function init() {
    const sections = [
        questions.slice(0, 25),
        questions.slice(25, 47),
        questions.slice(47, 65),
        questions.slice(65)
    ];
    set = shuffle([...shuffle(sections[0]).slice(0, 5), ...shuffle(sections[1]).slice(0, 5), ...shuffle(sections[2]).slice(0, 5), ...shuffle(sections[3]).slice(0, 5)]);
    answers = new Array(TOTAL).fill(null);
    idx = 0; left = TIME; done = false;
    clearInterval(timer);
    timer = setInterval(tick, 1000);
    render();
}

function tick() {
    left--;
    const el = document.getElementById('timer');
    if (el) {
        const m = Math.floor(left / 60);
        const s = left % 60;
        el.textContent = `⏱ ${m}:${String(s).padStart(2, '0')}`;
        if (left <= 60) el.className = 'timer warning';
    }
    if (left <= 0) { clearInterval(timer); submit(); }
}

function render() {
    if (done) return;
    const q = set[idx];
    const prog = ((idx + 1) / TOTAL) * 100;
    const letters = ['A', 'B', 'C', 'D'];
    
    document.getElementById('app').innerHTML = `
        <div class="header">
            <h1>📚 GPA MTH 102 QUIZ</h1>
            <span class="badge">${q.s}</span>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        </div>
        <div class="timer" id="timer"></div>
        <div class="quiz-body">
            <div class="question-text">Q${idx+1}. ${q.q}</div>
            <div class="options">
                ${q.o.map((o, i) => `
                    <div class="option ${answers[idx] === i ? 'selected' : ''}" onclick="pick(${i})">
                        <span class="opt-letter">${letters[i]}</span>
                        <span>${o}</span>
                    </div>
                `).join('')}
            </div>
        </div>
        <div class="dot-nav">
                  ${Array(TOTAL).fill(0).map((_, i) => `
                <div class="dot${i === idx ? ' active' : ''}${answers[i] !== null ? ' answered' : ''}" onclick="jump(${i})"></div>
            `).join('')}
        </div>
        <div class="bottom-nav">
            <button class="btn-prev" onclick="move(-1)" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
            <button class="btn-submit" onclick="submit()">Submit</button>
            <button class="btn-next" onclick="move(1)" ${idx === TOTAL - 1 ? 'disabled' : ''}>Next →</button>
        </div>
    `;
    
    MathJax.typesetPromise();
    tick();
}

function pick(i) { if (!done) { answers[idx] = i; render(); } }
function move(s) { if (idx + s >= 0 && idx + s < TOTAL) { idx += s; render(); } }
function jump(i) { if (!done) { idx = i; render(); } }

function submit() {
    if (done) return;
    done = true;
    clearInterval(timer);
    
    const score = answers.filter((a, i) => a === set[i].a).length;
    const pct = Math.round((score / TOTAL) * 100);
    let grade, color;
    if (pct >= 80) { grade = '🌟 Excellent!'; color = '#28a745'; }
    else if (pct >= 60) { grade = '👍 Good Job!'; color = '#20c997'; }
    else if (pct >= 40) { grade = '📚 Keep Practicing!'; color = '#ff851b'; }
    else { grade = '💪 Keep Trying!'; color = '#dc3545'; }
    
    document.getElementById('app').innerHTML = `
        <div class="header">
            <h1>📚 GPA MTH 102 QUIZ</h1>
            <span class="badge">Results</span>
        </div>
        <div class="score-screen">
            <h3 style="color:${color}">${grade}</h3>
            <div class="score-circle" style="background:${color}">
                <span class="score-num">${score}</span>
                <span class="score-label">/ ${TOTAL}</span>
            </div>
            <p style="font-size:18px;font-weight:bold">${pct}%</p>
            <h4 style="margin:10px 0">Review</h4>
            ${set.map((q, i) => {
                const ok = answers[i] === q.a;
                return `<div class="review-item ${ok ? 'review-correct' : 'review-wrong'}">
                    <b>Q${i+1}:</b> ${q.q}<br>
                    <span style="color:${ok ? '#28a745' : '#dc3545'}">${ok ? '✓' : '✗'} ${answers[i] !== null ? q.o[answers[i]] : 'Skipped'}</span>
                    ${!ok ? `<br><span style="color:#28a745">→ ${q.o[q.a]}</span>` : ''}
                </div>`;
            }).join('')}
            <button class="retake-btn" onclick="init()">🔄 Retake Quiz</button>
            <a href="https://chat.whatsapp.com/EfRqG1ekcym0MflO4MiEFj" class="join-btn">💬 Join Our Community</a>
        </div>
    `;
    MathJax.typesetPromise();
}

init();
</script>
</body>
</html>
