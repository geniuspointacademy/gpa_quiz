<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA CBT | MTH 102</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { padding: 12px; border: 1px solid #ddd; margin: 8px 0; cursor: pointer; border-radius: 5px; }
        .selected { background: #001f3f; color: white; }
        .correct { background: #28a745 !important; color: white; }
        .wrong { background: #dc3545 !important; color: white; }
        button { padding: 10px 20px; background: #ff851b; border: none; color: white; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .dance-btn { animation: dance 1s infinite alternate; background: #28a745; display: block; text-align: center; padding: 12px; color: white; border-radius: 5px; margin-top: 20px; text-decoration: none; }
        @keyframes dance { from { transform: translateY(0); } to { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div class="quiz-container" id="app">
    <div id="quiz-body"></div>
</div>

<script src="questions.js"></script>
<script>
    let currentSet = [], userAnswers = [], qIdx = 0;

    function initQuiz() {
        // 1. Get attempt number (0 to 5)
        let attempt = parseInt(localStorage.getItem('attempt') || '0');
        let start = attempt * 5; 
        
        // 2. Pick 5 from each section (Limits 0-29, Deriv 30-59, Apps 60-89, Algebra 90-119)
        currentSet = [
            ...allQuestions.slice(start, start + 5),
            ...allQuestions.slice(start + 30, start + 35),
            ...allQuestions.slice(start + 60, start + 65),
            ...allQuestions.slice(start + 90, start + 95)
        ];
        
        userAnswers = new Array(20).fill(null);
        localStorage.setItem('attempt', (attempt + 1) % 6);
        render();
    }

    function render() {
        let q = currentSet[qIdx];
        document.getElementById('quiz-body').innerHTML = `
            <h3>Q${qIdx + 1}: ${q.q}</h3>
            ${q.options.map((o, i) => `<div class="option ${userAnswers[qIdx] === i ? 'selected' : ''}" onclick="select(${i})">${o}</div>`).join('')}
            <div style="margin-top:20px;">
                <button onclick="change(-1)">Prev</button>
                <button onclick="change(1)">Next</button>
                <button onclick="submit()" style="background:#001f3f;">Submit</button>
            </div>
        `;
        MathJax.typesetPromise();
    }

    function select(i) { userAnswers[qIdx] = i; render(); }
    function change(step) { if(qIdx+step >= 0 && qIdx+step < 20) { qIdx += step; render(); } }

    function submit() {
        let score = userAnswers.filter((a, i) => a === currentSet[i].answer).length;
        let body = document.getElementById('quiz-body');
        body.innerHTML = `<h1>Score: ${score}/20</h1>`;
        // Add review buttons
        currentSet.forEach((q, i) => {
            let color = userAnswers[i] === q.answer ? 'correct' : 'wrong';
            body.innerHTML += `<div class="option ${color}">Q${i+1}: Correct was ${q.options[q.answer]}</div>`;
        });
        body.innerHTML += `<button onclick="location.reload()">Retake</button>
                           <a href="https://chat.whatsapp.com/EfRqG1ekcym0MflO4MiEFj" class="dance-btn">Join GPA Community 🚀</a>`;
    }
    
    initQuiz();
</script>
</body>
</html>
